name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  linux_tests:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4', '8.5']

    name: PHP ${{ matrix.php }} - Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: error_reporting=E_ALL
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-stable'

      - name: Execute tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: vendor/bin/phpunit --no-coverage

  windows_tests:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4', '8.5']

    name: PHP ${{ matrix.php }} - Windows

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-stable --ignore-platform-req=ext-posix'

      - name: Set PHPUnit
        shell: bash
        run: vendor/bin/phpunit --version

      - name: Execute tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: vendor/bin/phpunit --no-coverage

  update_badge:
    needs: linux_tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    name: Update coverage badge
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          ini-values: error_reporting=E_ALL
          coverage: xdebug

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-stable'

      - name: Execute tests with coverage
        run: vendor/bin/phpunit

      - name: Generate coverage badge
        uses: timkrase/phpunit-coverage-badge@v1.2.1
        with:
          coverage_badge_path: 'badge-coverage.svg'
          push_badge: false

      - name: Push badge to badge branch
        run: |
          cp badge-coverage.svg /tmp/badge-coverage.svg
          rm badge-coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badge || true
          if git rev-parse --verify origin/badge >/dev/null 2>&1; then
            git checkout badge
          else
            git checkout --orphan badge
            git rm -rf .
          fi
          cp /tmp/badge-coverage.svg badge-coverage.svg
          git add badge-coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge"
          git push origin badge